<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Optimizer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>Mobile Health & Performance Optimizer</h1>
<button onclick="toggleDark()">Dark Mode</button>
</header>

<main>
<section class="card">
<h2>Phone Analyzer</h2>

<label for="brand">Select Brand:</label>
<select id="brand" onchange="loadSeries()"></select>

<label for="series">Select Series:</label>
<select id="series" onchange="loadModels()"></select>

<label for="model">Select Model:</label>
<select id="model" onchange="showPhoneData()"></select>

<div id="phoneSpecs" class="phone-specs"></div>
</section>

<section class="card">
<h2>Phone Health & Performance</h2>
<button onclick="analyzePhone()">Analyze Phone</button>
<div id="healthScore"></div>
<div class="bar">
  <div id="storageBar"></div>
</div>
<div id="performanceTips"></div>
<canvas id="performanceChart"></canvas>
</section>

<section class="card">
<h2>Virus / Malware Checker</h2>
<label><input type="checkbox" id="highStorage"> Storage > 80%</label>
<label><input type="checkbox" id="unknownApps"> Unknown Apps Installed</label>
<label><input type="checkbox" id="batteryDrain"> Battery Draining Fast</label>
<label><input type="checkbox" id="backgroundApps"> High Background Apps</label>
<button onclick="checkVirus()">Scan Phone</button>
<div id="virusResult"></div>
</section>

<section class="card">
<h2>Internet Speed Test</h2>
<button onclick="speedTest()">Run Test</button>
<div id="speedResult"></div>
</section>

<section class="card">
<h2>Optimize My Phone</h2>
<button onclick="optimizePhone()">Optimize</button>
<div id="optimizeResult"></div>
</section>

<section class="card">
<h2>Compare Phones</h2>
<label>Phone 1:
<select id="compare1" onchange="loadCompareModels('compare1','compare1Model')"></select>
<select id="compare1Model" onchange="showComparison()"></select>
</label>
<label>Phone 2:
<select id="compare2" onchange="loadCompareModels('compare2','compare2Model')"></select>
<select id="compare2Model" onchange="showComparison()"></select>
</label>
<div id="comparisonResult"></div>
</section>

</main>

<script src="phones.js"></script>
<script src="script.js"></script>
</body>
</html>
